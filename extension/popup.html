<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 12px;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2d2d44;
    }
    .title {
      font-weight: bold;
      font-size: 15px;
      color: #e94560;
    }
    .status-badge {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      transition: background 0.3s;
    }
    .status-badge.connected { background: #00ff88; box-shadow: 0 0 8px #00ff8844; }
    .status-badge.disconnected { background: #ff4444; }
    .section {
      margin-bottom: 10px;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8888aa;
      margin-bottom: 6px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 12px;
    }
    .info-label { color: #8888aa; }
    .info-value { color: #e0e0e0; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn {
      background: #2d2d44;
      border: none;
      color: #e0e0e0;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: background 0.2s;
      width: 100%;
      text-align: center;
      margin-top: 6px;
    }
    .btn:hover { background: #3d3d55; }
    .btn.primary { background: #e94560; color: #fff; }
    .btn.primary:hover { background: #d63850; }
    .log {
      max-height: 120px;
      overflow-y: auto;
      background: #0f0f1a;
      border-radius: 4px;
      padding: 6px;
      font-size: 11px;
      line-height: 1.4;
      margin-top: 6px;
    }
    .log-entry { color: #666688; }
    .log-entry.info { color: #88aaff; }
    .log-entry.error { color: #ff6666; }
    .log-entry.success { color: #66ff88; }
    .footer {
      font-size: 10px;
      color: #555577;
      text-align: center;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #2d2d44;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">Browseye</span>
    <span id="statusDot" class="status-badge disconnected"></span>
  </div>

  <div class="section">
    <div class="section-title">Connection</div>
    <div class="info-row"><span class="info-label">Server</span><span class="info-value">ws://127.0.0.1:8765</span></div>
    <div class="info-row"><span class="info-label">Status</span><span class="info-value" id="statusText">Disconnected</span></div>
    <div class="info-row"><span class="info-label">Active Tab</span><span class="info-value" id="activeTab">—</span></div>
  </div>

  <div class="section">
    <div class="section-title">Quick Actions</div>
    <button class="btn primary" id="btnScreenshot">Screenshot Tab</button>
    <button class="btn" id="btnGetLinks">Get Page Links</button>
    <button class="btn" id="btnGetHTML">Dump Page HTML</button>
    <button class="btn" id="btnReconnect">Reconnect WS</button>
  </div>

  <div class="section">
    <div class="section-title">Activity Log</div>
    <div class="log" id="logContainer">
      <div class="log-entry info">Extension loaded. Awaiting connection...</div>
    </div>
  </div>

  <div class="footer">Browseye v1.0.0 — ENI</div>

  <script src="popup.js"></script>
</body>
</html>
